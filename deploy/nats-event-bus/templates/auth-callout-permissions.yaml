{{/*
Permissions config for auth-callout. Merges operator-defined permissions with
auto-generated NKey entries for internal services (NACK, mTLS leaves, CPC leaves).
Pubkeys use ${ENV_VAR} syntax for runtime expansion from secrets.
*/}}
{{- $dcAccount := include "nats-event-bus.dcAccount" . -}}
{{- $autoNkeys := dict
    "nack-controller" (dict "public_key" "${NKEY_NACK_USER_PUBKEY}" "account" $dcAccount)
    "surveyor" (dict "public_key" "${NKEY_SURVEYOR_PUBKEY}" "account" "SYS")
-}}
{{- if .Values.global.eventBus.mtls.enabled }}
{{- $autoNkeys = set $autoNkeys "mtls-leaf" (dict "public_key" "${NKEY_MTLS_LEAF_PUBKEY}" "account" $dcAccount) }}
{{- $autoNkeys = set $autoNkeys "mtls-authx-leaf" (dict "public_key" "${NKEY_MTLS_AUTHX_LEAF_PUBKEY}" "account" "AUTHX") }}
{{- $autoNkeys = set $autoNkeys "mtls-sys-leaf" (dict "public_key" "${NKEY_MTLS_SYS_LEAF_PUBKEY}" "account" "SYS") }}
{{- end }}
{{- if eq .Values.global.eventBus.clusterType "csc" }}
{{- range .Values.global.eventBus.cpcIds }}
{{- $autoNkeys = set $autoNkeys (printf "leaf-cpc-%s" .) (dict "public_key" (printf "${NKEY_LEAF_CPC_%s_PUBKEY}" .) "account" "CSC") }}
{{- end }}
{{- range $accountName, $config := .Values.global.eventBus.extraAccounts }}
{{- $enabled := true -}}
{{- if hasKey $config "enabled" -}}
{{- $enabled = $config.enabled -}}
{{- end -}}
{{- if $enabled }}
{{- $accountEnvName := include "nats-event-bus.extraAccountEnvName" $accountName -}}
{{- $accountSecretName := include "nats-event-bus.extraAccountSecretName" $accountName -}}
{{- $pubkeyEnvPrefix := printf "NKEY_LEAF_%s_CPC" $accountEnvName -}}
{{- range $.Values.global.eventBus.cpcIds }}
{{- $cpcId := toString . -}}
{{- $pubkeyEnv := printf "%s_%s_PUBKEY" $pubkeyEnvPrefix $cpcId -}}
{{- $autoNkeys = set $autoNkeys (printf "leaf-%s-cpc-%s" $accountSecretName $cpcId) (dict "public_key" (printf "${%s}" $pubkeyEnv) "account" $accountName) }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}
{{- $userNkeys := .Values.global.eventBus.auth.permissions.nkey | default dict -}}
{{- $mergedNkeys := merge $userNkeys $autoNkeys -}}
{{- $permissions := .Values.global.eventBus.auth.permissions | deepCopy -}}
{{- $_ := set $permissions "nkey" $mergedNkeys -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: auth-callout-permissions
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/component: auth-callout
    app.kubernetes.io/part-of: nats-event-bus
data:
  permissions.json: {{ $permissions | toJson | quote }}
