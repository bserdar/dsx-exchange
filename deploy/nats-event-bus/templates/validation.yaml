{{/*
Validation template for nats-event-bus values.
This template emits no resources; it fails rendering on unsafe combinations.
*/}}
{{- $extraAccountEnvNames := dict -}}
{{- $extraAccountSecretNames := dict -}}
{{- $reservedAccountNames := dict "SYS" true "AUTH" true "AUTHX" true "CSC" true "CPC" true -}}
{{- $cpcIds := dict -}}
{{- $eventBus := .Values.global.eventBus | default dict -}}
{{/* Cluster role controls nearly every generated account, leaf, and JS mapping. */}}
{{- $clusterType := required "global.eventBus.clusterType is required and must be either csc or cpc." $eventBus.clusterType -}}
{{- if not (or (eq $clusterType "csc") (eq $clusterType "cpc")) -}}
{{- fail (printf "global.eventBus.clusterType must be either csc or cpc, got %q." $clusterType) -}}
{{- end -}}
{{/* CPC clusters need a stable ID for generated subjects/secrets and a CSC leaf endpoint. */}}
{{- if eq $clusterType "cpc" -}}
{{- $clusterId := required "global.eventBus.clusterId is required when global.eventBus.clusterType is cpc." $eventBus.clusterId | toString -}}
{{- if not (regexMatch "^[a-z0-9]+$" $clusterId) -}}
{{- fail (printf "global.eventBus.clusterId must use lower-case letters and numbers only, got %q." $clusterId) -}}
{{- end -}}
{{- $_ := required "global.eventBus.cscEndpoint is required when global.eventBus.clusterType is cpc." $eventBus.cscEndpoint -}}
{{- end -}}
{{/* CSC cpcIds are embedded into secret names, env vars, and cross-layer subjects. */}}
{{- range .Values.global.eventBus.cpcIds }}
{{- $cpcId := toString . -}}
{{- if not (regexMatch "^[a-z0-9]+$" $cpcId) -}}
{{- fail (printf "global.eventBus.cpcIds includes %q, but CPC IDs must use lower-case letters and numbers only so generated secret names and env vars are valid." $cpcId) -}}
{{- end -}}
{{- if hasKey $cpcIds $cpcId -}}
{{- fail (printf "global.eventBus.cpcIds includes duplicate ID %q." $cpcId) -}}
{{- end -}}
{{- $_ := set $cpcIds $cpcId true -}}
{{- end -}}
{{/*
Extra accounts generate Kubernetes secret names, env vars, native NATS accounts,
and leaf connections. Reject ambiguous names before they become broken resources.
*/}}
{{- range $accountName, $config := .Values.global.eventBus.extraAccounts }}
{{- $enabled := true -}}
{{- if hasKey $config "enabled" -}}
{{- $enabled = $config.enabled -}}
{{- end -}}
{{- if $enabled -}}
{{- if not (regexMatch "^[A-Za-z][A-Za-z0-9]*$" $accountName) -}}
{{- fail (printf "global.eventBus.extraAccounts.%s is not a valid NATS account name. Use letters and numbers only, starting with a letter." $accountName) -}}
{{- end -}}
{{- if hasKey $reservedAccountNames (upper $accountName) -}}
{{- fail (printf "global.eventBus.extraAccounts.%s conflicts with a built-in NATS account name." $accountName) -}}
{{- end -}}
{{- if regexMatch "^CPC" (upper $accountName) -}}
{{- fail (printf "global.eventBus.extraAccounts.%s is not allowed because extra account names must not start with cpc." $accountName) -}}
{{- end -}}
{{- $envToken := include "nats-event-bus.extraAccountEnvName" $accountName -}}
{{- $secretToken := include "nats-event-bus.extraAccountSecretName" $accountName -}}
{{- if eq $envToken "" -}}
{{- fail (printf "global.eventBus.extraAccounts includes %q, but its env token is empty after normalization." $accountName) -}}
{{- end -}}
{{- if eq $secretToken "" -}}
{{- fail (printf "global.eventBus.extraAccounts includes %q, but its secret-name token is empty after normalization." $accountName) -}}
{{- end -}}
{{- if hasKey $extraAccountEnvNames $envToken -}}
{{- fail (printf "global.eventBus.extraAccounts.%s normalizes to env token %s, which is already used by global.eventBus.extraAccounts.%s." $accountName $envToken (get $extraAccountEnvNames $envToken)) -}}
{{- end -}}
{{- if hasKey $extraAccountSecretNames $secretToken -}}
{{- fail (printf "global.eventBus.extraAccounts.%s normalizes to secret token %s, which is already used by global.eventBus.extraAccounts.%s." $accountName $secretToken (get $extraAccountSecretNames $secretToken)) -}}
{{- end -}}
{{- $_ := set $extraAccountEnvNames $envToken $accountName -}}
{{- $_ := set $extraAccountSecretNames $secretToken $accountName -}}
{{- end -}}
{{- end -}}
{{/* Chart-generated NKey permission names are reserved so auth-callout config is deterministic. */}}
{{- $userNkeys := .Values.global.eventBus.auth.permissions.nkey | default dict -}}
{{- $generatedNkeyNames := dict
  "nack-controller" true
  "surveyor" true
-}}
{{- if .Values.global.eventBus.mtls.enabled -}}
{{- $_ := set $generatedNkeyNames "mtls-leaf" true -}}
{{- $_ := set $generatedNkeyNames "mtls-authx-leaf" true -}}
{{- $_ := set $generatedNkeyNames "mtls-sys-leaf" true -}}
{{- end -}}
{{- if eq .Values.global.eventBus.clusterType "csc" -}}
{{- range .Values.global.eventBus.cpcIds }}
{{- $_ := set $generatedNkeyNames (printf "leaf-cpc-%s" .) true -}}
{{- end -}}
{{- range $accountName, $config := .Values.global.eventBus.extraAccounts }}
{{- $enabled := true -}}
{{- if hasKey $config "enabled" -}}
{{- $enabled = $config.enabled -}}
{{- end -}}
{{- if $enabled -}}
{{- $accountSecretName := include "nats-event-bus.extraAccountSecretName" $accountName -}}
{{- range $.Values.global.eventBus.cpcIds }}
{{- $_ := set $generatedNkeyNames (printf "leaf-%s-cpc-%s" $accountSecretName .) true -}}
{{- end -}}
{{- end -}}
{{- end -}}
{{- end -}}
{{- range $name, $_ := $generatedNkeyNames -}}
{{- if hasKey $userNkeys $name -}}
{{- fail (printf "global.eventBus.auth.permissions.nkey.%s conflicts with a chart-generated NKey permission. Use a different operator-defined NKey permission name." $name) -}}
{{- end -}}
{{- end -}}
{{/* Generated auth-callout env vars own secret wiring; user env overrides must not collide. */}}
{{- $authCallout := index .Values "auth-callout" | default dict -}}
{{- $authCalloutExtraEnvs := get $authCallout "extraEnvs" | default dict -}}
{{- $generatedAuthCalloutEnvNames := dict
  "AUTH_CALLOUT_NATS_NKEY_SEED" true
  "AUTH_CALLOUT_NATS_ISSUER_SEED" true
  "AUTH_CALLOUT_NATS_XKEY_SEED" true
  "NKEY_NACK_USER_PUBKEY" true
  "NKEY_SURVEYOR_PUBKEY" true
-}}
{{- if .Values.global.eventBus.mtls.enabled -}}
{{- $_ := set $generatedAuthCalloutEnvNames "NKEY_MTLS_LEAF_PUBKEY" true -}}
{{- $_ := set $generatedAuthCalloutEnvNames "NKEY_MTLS_AUTHX_LEAF_PUBKEY" true -}}
{{- $_ := set $generatedAuthCalloutEnvNames "NKEY_MTLS_SYS_LEAF_PUBKEY" true -}}
{{- end -}}
{{- if eq .Values.global.eventBus.clusterType "csc" -}}
{{- range .Values.global.eventBus.cpcIds }}
{{- $_ := set $generatedAuthCalloutEnvNames (printf "NKEY_LEAF_CPC_%s_PUBKEY" .) true -}}
{{- end -}}
{{- range $accountName, $config := .Values.global.eventBus.extraAccounts }}
{{- $enabled := true -}}
{{- if hasKey $config "enabled" -}}
{{- $enabled = $config.enabled -}}
{{- end -}}
{{- if $enabled -}}
{{- $accountEnvName := include "nats-event-bus.extraAccountEnvName" $accountName -}}
{{- range $.Values.global.eventBus.cpcIds }}
{{- $_ := set $generatedAuthCalloutEnvNames (printf "NKEY_LEAF_%s_CPC_%s_PUBKEY" $accountEnvName .) true -}}
{{- end -}}
{{- end -}}
{{- end -}}
{{- end -}}
{{- range $name, $_ := $generatedAuthCalloutEnvNames -}}
{{- if hasKey $authCalloutExtraEnvs $name -}}
{{- fail (printf "auth-callout.extraEnvs.%s conflicts with a chart-generated auth-callout env var. Use a different operator-defined env var name." $name) -}}
{{- end -}}
{{- end -}}
