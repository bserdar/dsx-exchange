# GitLab CI/CD Pipeline for nv-config Go Library
image: golang:1.24.3

default:
  tags:
    - prod
    - eks
    - nvcf-cds

# Define stages
stages:
  - validate
  - test
  - build
  - security
  - deploy

# Global variables
variables:
  GOPATH: $CI_PROJECT_DIR/.go
  GO_MOD_CACHE: $CI_PROJECT_DIR/.go/pkg/mod
  GOPROXY: https://proxy.golang.org,direct
  GOSUMDB: sum.golang.org

# Cache configuration
.go-cache: &go-cache
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - .go/pkg/mod/

# Before script for most jobs
.go-before-script: &go-before-script
  before_script:
    - mkdir -p .go
    - export GOPATH=$CI_PROJECT_DIR/.go
    - export PATH=$GOPATH/bin:$PATH
    - go version
    - go mod download

# Validation stage
validate:mod:
  stage: validate
  <<: [*go-cache, *go-before-script]
  script:
    - go mod verify
    - go mod tidy
    - git diff --exit-code go.mod go.sum
  rules:
    - if: $CI_MERGE_REQUEST_ID
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

validate:format:
  stage: validate
  script:
    - test -z "$(gofmt -l .)"
  rules:
    - if: $CI_MERGE_REQUEST_ID
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

validate:lint:
  stage: validate
  <<: [*go-cache, *go-before-script]
  script:
    - go vet ./...
    - go install honnef.co/go/tools/cmd/staticcheck@v0.6.1
    - staticcheck ./...
  rules:
    - if: $CI_MERGE_REQUEST_ID
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# Test stage
test:unit:
  stage: test
  <<: [*go-cache, *go-before-script]
  script:
    - go test -v -race -coverprofile=coverage.out $(go list ./... | grep -v '/examples')
    - go tool cover -func=coverage.out
    - go tool cover -html=coverage.out -o coverage.html
  coverage: '/total:\s+\(statements\)\s+(\d+\.?\d*)%/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    paths:
      - coverage.html
      - coverage.out
    expire_in: 30 days
  rules:
    - if: $CI_MERGE_REQUEST_ID
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

test:integration:
  stage: test
  <<: [*go-cache, *go-before-script]
  script:
    - go test -v ./test/...
  rules:
    - if: $CI_MERGE_REQUEST_ID
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

test:benchmark:
  stage: test
  <<: [*go-cache, *go-before-script]
  script:
    - go test -bench=. -benchmem ./...
  allow_failure: true
  rules:
    - if: $CI_MERGE_REQUEST_ID
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# Different Go versions compatibility test
test:go-versions:
  stage: test
  parallel:
    matrix:
      - GO_VERSION: ["1.24"]
  image: golang:${GO_VERSION}
  script:
    - go test ./...
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_MERGE_REQUEST_ID

# Build stage
build:library:
  stage: build
  <<: [*go-cache, *go-before-script]
  script:
    - go build ./...
  rules:
    - if: $CI_MERGE_REQUEST_ID
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

build:examples:
  stage: build
  <<: [*go-cache, *go-before-script]
  script:
    # Build and test basic example
    - cd examples/basic
    - go build -o basic main.go
    - timeout 5s ./basic || true

    # Build library examples (verify compilation)
    - cd ../library/database && go build ./...
    - cd ../httpclient && go build ./...
    - cd ../redis && go build ./...
    - cd ../tracing-otel && go build ./...
    - cd ../tracing-lightstep && go build ./...

    # Build and test service example
    - cd ../../service
    - go build -o service main.go
    - timeout 10s ./service || true
  artifacts:
    paths:
      - examples/basic/basic
      - examples/service/service
    expire_in: 1 day
  rules:
    - if: $CI_MERGE_REQUEST_ID
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# Security stage
security:scan:
  stage: security
  <<: [*go-cache, *go-before-script]
  script:
    - go install golang.org/x/vuln/cmd/govulncheck@latest
    - govulncheck ./...
  allow_failure: true
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_MERGE_REQUEST_ID

# Deploy stage (for releases)
deploy:release:
  stage: deploy
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  variables:
    GIT_STRATEGY: none
  script:
    - echo "Creating release for tag $CI_COMMIT_TAG"
  release:
    tag_name: $CI_COMMIT_TAG
    description: |
      Release $CI_COMMIT_TAG of nv-config library.

      See [CHANGELOG.md](CHANGELOG.md) for details.
    ref: $CI_COMMIT_SHA
  rules:
    - if: $CI_COMMIT_TAG =~ /^v[0-9]+\.[0-9]+\.[0-9]+$/

# Documentation deployment (GitHub Pages style)
pages:
  stage: deploy
  image: golang:1.24.3
  <<: [*go-cache, *go-before-script]
  script:
    - go install golang.org/x/tools/cmd/godoc@latest
    - mkdir public
    - echo "Generating documentation..."
    - godoc -html ./... > public/index.html || echo "Documentation generated"
    - cp coverage.html public/coverage.html 2>/dev/null || echo "No coverage report found"
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# Cleanup job
cleanup:cache:
  stage: .post
  script:
    - echo "Cleaning up..."
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    policy: pull
  rules:
    - when: always
