#
# Generates a Fern preview URL and posts it as a PR comment.
# Uses the push trigger on copy-pr-bot branches so secrets are available
# without the two-workflow artifact handoff.
#
# Required configuration:
# - Organization secret: DOCS_FERN_TOKEN

name: Fern Docs Preview

on:
  push:
    branches:
      - "pull-request/[0-9]+"
    paths:
      - 'docs/**'
      - 'fern/**'
      - '.github/workflows/fern-docs-preview.yml'

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: fern-preview-${{ github.ref }}
  cancel-in-progress: true

jobs:
  preview:
    name: Preview
    runs-on: linux-amd64-cpu4
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve PR number
        id: pr
        run: |
          PR_NUMBER="${GITHUB_REF_NAME##pull-request/}"
          if ! [[ "$PR_NUMBER" =~ ^[0-9]+$ ]]; then
            echo "::error::Could not extract PR number from branch ${GITHUB_REF_NAME}"
            exit 1
          fi
          echo "number=$PR_NUMBER" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Fern CLI
        run: npm install -g fern-api

      - name: Generate preview URL
        id: generate-docs
        env:
          FERN_TOKEN: ${{ secrets.DOCS_FERN_TOKEN }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
        working-directory: ./fern
        run: |
          set -o pipefail
          fern generate --docs --preview --id "pr-${PR_NUMBER}" 2>&1 | tee /tmp/fern-output.log
          URL=$(grep -oP 'Published docs to \K.*(?= \()' /tmp/fern-output.log || true)
          if [ -z "$URL" ]; then
            echo "::error::Failed to extract preview URL from fern output"
            exit 1
          fi
          echo "preview_url=$URL" >> "$GITHUB_OUTPUT"

      - name: Build page links for changed files
        id: page-links
        env:
          FERN_TOKEN: ${{ secrets.DOCS_FERN_TOKEN }}
          PREVIEW_URL: ${{ steps.generate-docs.outputs.preview_url }}
        run: |
          CHANGED_FILES=$(git diff --name-only "origin/main...HEAD" -- '*.md' '*.mdx' 2>/dev/null || true)

          if [ -z "$CHANGED_FILES" ] || [ -z "$PREVIEW_URL" ]; then
            echo "page_links=" >> "$GITHUB_OUTPUT"; exit 0
          fi

          BASE_URL=$(echo "$PREVIEW_URL" | grep -oP 'https?://[^/]+')
          FILES_PARAM=$(echo "$CHANGED_FILES" | tr '\n' ',' | sed 's/,$//' \
            | python3 -c "import sys, urllib.parse; print(urllib.parse.quote(sys.stdin.read().strip(), safe=',/'))")
          RESPONSE=$(curl -sf -H "FERN_TOKEN: $FERN_TOKEN" "${PREVIEW_URL}/api/fern-docs/get-slug-for-file?files=${FILES_PARAM}" 2>/dev/null) || {
            echo "page_links=" >> "$GITHUB_OUTPUT"; exit 0
          }

          PAGE_LINKS=$(echo "$RESPONSE" | jq -r --arg url "$BASE_URL" \
            '.mappings[] | select(.slug != null) | "- [\(.slug)](\($url)/\(.slug))"')

          if [ -n "$PAGE_LINKS" ]; then
            { echo "page_links<<EOF"; echo "$PAGE_LINKS"; echo "EOF"; } >> "$GITHUB_OUTPUT"
          else
            echo "page_links=" >> "$GITHUB_OUTPUT"
          fi

      - name: Post or update PR comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          PREVIEW_URL: ${{ steps.generate-docs.outputs.preview_url }}
          PAGE_LINKS: ${{ steps.page-links.outputs.page_links }}
        run: |
          BODY=":herb: **Preview your docs:** <${PREVIEW_URL}>"
          if [ -n "${PAGE_LINKS}" ]; then
            BODY="${BODY}

          Here are the markdown pages you've updated:
          ${PAGE_LINKS}"
          fi

          MARKER="<!-- preview-docs -->"
          BODY="${BODY}

          ${MARKER}"

          COMMENT_ID=$(gh api "repos/${{ github.repository }}/issues/${PR_NUMBER}/comments" \
            --jq ".[] | select(.body | contains(\"${MARKER}\")) | .id" | tr -d '\r' | head -1)

          if [ -n "$COMMENT_ID" ]; then
            gh api "repos/${{ github.repository }}/issues/comments/${COMMENT_ID}" \
              -X PATCH -f body="$BODY"
          else
            gh api "repos/${{ github.repository }}/issues/${PR_NUMBER}/comments" \
              -f body="$BODY"
          fi
