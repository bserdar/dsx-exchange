# Security note: No untrusted input is used in run commands.

name: Stale Check

on:
  schedule:
    - cron: "0 0 * * *"

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    name: Mark Stale Issues and PRs
    runs-on: ubuntu-latest # FIXME: linux-amd64-cpu4
    steps:
      - uses: NVIDIA/dsx-github-actions/.github/actions/stale-check@739847ddf00fda38916504ef84e1f504eac3158f # v1.16.0
