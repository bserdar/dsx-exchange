# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
reviews:
  auto_review:
    enabled: true
    drafts: true
    base_branches:
      - ".*"
    auto_incremental_review: true
    auto_pause_after_reviewed_commits: 0
  pre_merge_checks:
    docstrings:
      mode: warning
      threshold: 80
  finishing_touches:
    docstrings:
      enabled: true
  tools:
    golangci-lint:
      enabled: true
      config_file: "auth-callout/.golangci.yml"

code_generation:
  docstrings:
    path_instructions:
      - path: "**/*"
        instructions: |
          Keep docstrings selective and short. Document non-obvious what or why;
          do not restate signatures, parameters, returns, or control flow that
          are clear from skimming the code.
