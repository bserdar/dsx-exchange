# CSC-specific values
#
# This file contains operator-facing configuration only.
# Internal NATS accounts, mappings, and leaf nodes are auto-generated
# by the nats-event-bus Helm chart based on global.eventBus.clusterType.

# Event Bus Configuration
global:
  eventBus:
    clusterType: csc
    # List of CPC IDs that will connect as leaves
    cpcIds: ["1", "2"]

    # Auth permissions for CSC account
    auth:
      permissions:
        oauth2:
          csc-admin:
            subject: "csc-admin@example.com"
            account: "CSC"
          mqtt-client:
            azp: "mqtt-client"
            account: "CSC"
            permissions:
              pub:
                allow: ["test.>", "perf.>", "cpc.*.test.>"]
              sub:
                allow: ["test.>", "perf.>", "cpc.*.test.>"]
          mqtt-publisher:
            azp: "mqtt-publisher"
            account: "CSC"
            permissions:
              pub:
                allow: ["test.>", "perf.>", "cpc.*.test.>"]
              sub:
                allow: ["dummy.>"]
          mqtt-subscriber:
            azp: "mqtt-subscriber"
            account: "CSC"
            permissions:
              pub:
                allow: ["dummy.>"]
              sub:
                allow: ["test.>", "perf.>", "cpc.*.test.>"]
          launchlayer-client:
            azp: "launchlayer-client"
            account: "LaunchLayer"
            permissions:
              pub:
                allow: ["launchlayer.>", "$JS.API.>"]
              sub:
                allow: ["launchlayer.>", "_INBOX.>"]
        mtls:
          mqtt-client:
            identity: "CN=mqtt-client.csc"
            account: "CSC"
        noauth:
          account: "CSC"
